services:
  postgres:
    image: postgres:16-alpine
    container_name: my-turborepo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_turborepo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_turborepo"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db-init:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/my_turborepo
    command: ["sh", "-c", "cd packages/db && npx prisma db push"]
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: my-turborepo-backend
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/my_turborepo
    ports:
      - "3001:3000"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: my-turborepo-frontend
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/my_turborepo
    ports:
      - "3000:3000"

volumes:
  postgres_data:
